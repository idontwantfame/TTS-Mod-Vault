name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Analyse ──────────────────────────────────────────────────────────────────
  analyse:
    name: Analyse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: analyse
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK & build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release

      - name: Package
        run: |
          tar -czf tts-mod-vault-linux-x64.tar.gz \
            -C build/linux/x64/release/bundle .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: tts-mod-vault-linux-x64.tar.gz
          retention-days: 7

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: analyse
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build windows --release

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path   build/windows/x64/runner/Release/* `
            -DestinationPath tts-mod-vault-windows-x64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: tts-mod-vault-windows-x64.zip
          retention-days: 7

  # ── macOS ────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: analyse
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build (unsigned)
        run: flutter build macos --release
        env:
          # Skip code-signing for CI; add your signing certificates to
          # repository secrets and remove these lines to produce a signed build.
          FLUTTER_XCODE_CODE_SIGNING_ALLOWED: 'NO'
          FLUTTER_XCODE_CODE_SIGN_IDENTITY: ''
          FLUTTER_XCODE_CODE_SIGNING_REQUIRED: 'NO'

      - name: Package
        run: |
          cd "build/macos/Build/Products/Release"
          zip -r --symlinks \
            ../../../../../tts-mod-vault-macos.zip \
            "TTS Mod Vault.app"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: tts-mod-vault-macos.zip
          retention-days: 7

  # ── Release (tags only) ──────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tts-mod-vault-linux-x64.tar.gz
            tts-mod-vault-windows-x64.zip
            tts-mod-vault-macos.zip
